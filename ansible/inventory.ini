[master]
k8s-master ansible_host=<MASTER_PUBLIC_IP> ansible_user=ubuntu ansible_ssh_private_key_file=./my-key-terraform.pem

[workers]
k8s-worker ansible_host=<WORKER_PUBLIC_IP> ansible_user=ubuntu ansible_ssh_private_key_file=./my-key-terraform.pem

[all:vars]
ansible_python_interpreter=/usr/bin/python3
ansible_ssh_common_args='-o StrictHostKeyChecking=no'
