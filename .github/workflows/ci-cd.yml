name: CI/CD Pipeline - DevOps K8s

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/devops-k8s-app

jobs:

  # ─────────────────────────────────────────
  # JOB 1 : BUILD
  # ─────────────────────────────────────────
  build:
    name: 🔨 Build Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────
  # JOB 2 : TEST
  # ─────────────────────────────────────────
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pytest
        run: pytest test_app.py -v

  # ─────────────────────────────────────────
  # JOB 3 : DEPLOY
  # ─────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/my-key-terraform.pem
          chmod 400 ~/.ssh/my-key-terraform.pem
          ssh-keyscan -H ${{ secrets.MASTER_IP }} >> ~/.ssh/known_hosts

      - name: Update image tag on Master node
        run: |
          ssh -i ~/.ssh/my-key-terraform.pem ubuntu@${{ secrets.MASTER_IP }} \
            "kubectl set image deployment/flask-app \
             flask-app=${{ env.IMAGE_NAME }}:${{ github.sha }} \
             --record"

      - name: Wait for rollout
        run: |
          ssh -i ~/.ssh/my-key-terraform.pem ubuntu@${{ secrets.MASTER_IP }} \
            "kubectl rollout status deployment/flask-app --timeout=120s"

      - name: Verify deployment
        run: |
          ssh -i ~/.ssh/my-key-terraform.pem ubuntu@${{ secrets.MASTER_IP }} \
            "kubectl get pods -l app=flask-app"
