name: CI/CD Pipeline - DevOps K8s

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/devops-k8s-app

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v3

      - name: Setup Python 3.9
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Installation des dependances
        run: pip install -r requirements.txt

      - name: Execution des tests pytest
        run: pytest test_app.py -v

  docker-build-push:
    name: Docker Build and Push
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Checkout du code
        uses: actions/checkout@v3

      - name: Login sur Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build et Push de l image Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: docker-build-push
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout du code
        uses: actions/checkout@v3

     - name: Configuration de kubectl
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Mise a jour de l image dans le manifest
        run: sed -i "s|IMAGE_TAG|${{ github.sha }}|g" k8s/deployment.yml

      - name: Deploiement sur Kubernetes
        run: |
          kubectl apply -f k8s/deployment.yml
          kubectl rollout status deployment/devops-app -n default --timeout=120s

      - name: Verification du deploiement
        run: |
          kubectl get pods -n default
          kubectl get services -n default
